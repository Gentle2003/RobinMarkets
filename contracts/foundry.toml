[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [
    { access = "read", path = "./" },
    { access = "write", path = "./deployments" },
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
rh_testnet = "https://rpc.testnet.chain.robinhood.com"
rh_mainnet = "https://rpc.mainnet.chain.robinhood.com"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
